name: CLA

# Contributors sign .github/CLA.md before their first PR merges. The CLA grants the
# right to license contributions under terms other than AGPL-3.0, which is what makes
# the commercial licence offered in the README something we can actually grant.
#
# A DCO would NOT do this job: it certifies provenance, not relicensing rights.
#
# The action is pinned to a commit SHA rather than a tag because
# contributor-assistant/github-action was archived in March 2026. The release still
# works, but nothing upstream will move again, and a tag on an archived repo is not a
# guarantee. Re-evaluate if a maintained fork appears.
#
# SETUP (one-off, required before this workflow does anything):
#   Create a branch named `cla-signatures` and leave it unprotected. Signatures are
#   committed there, never to main. The branch must already exist: the action writes
#   via createOrUpdateFileContents, which does not create branches.
#
# No PAT is needed. The action only reaches for PERSONAL_ACCESS_TOKEN when signatures
# live in a *remote* repo (see its persistence.ts); ours are in this one, so the
# built-in GITHUB_TOKEN signs them, authorised by `contents: write` below. Branch
# protection on cla-signatures would block that write.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, closed]

# pull_request_target runs in the base-repo context with access to secrets.
# This workflow never checks out the PR's code, which is what makes that safe.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  cla:
    name: Check CLA signature
    runs-on: ubuntu-latest
    steps:
      - name: Check or record CLA signature
        if: >-
          github.event_name == 'pull_request_target' ||
          github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: 'https://github.com/DroppedNeedle/DroppedNeedle/blob/main/.github/CLA.md'
          path-to-signatures: 'signatures/version1/cla.json'
          branch: 'cla-signatures'
          allowlist: HabiRabbu,dependabot[bot],github-actions[bot]
          custom-notsigned-prcomment: >-
            Thanks for the pull request. Before it can be merged, please read and sign the
            [Contributor License Agreement](https://github.com/DroppedNeedle/DroppedNeedle/blob/main/.github/CLA.md).
            You keep the copyright in your work; the CLA grants DroppedNeedle the right to
            distribute it, including under the project's commercial licence.
            To sign, reply to this pull request with:
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you.'
